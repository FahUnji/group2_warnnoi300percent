  <!-- ── Top NavBar ── -->

      </div>

      <div class="nav-actions">
        <button class="nav-btn" aria-label="Notifications">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 0 1-3.46 0" stroke="#434654" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

        </button>

        </button>

        <div class="page-header-right">
          <div class="export-wrap">
            <button class="btn-outline" onclick="toggleExportMenu(event)">

                <path d="M1 1L5 5L9 1" stroke="#065b41" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
            <div class="export-menu" id="exportMenu">
              <button class="export-item" onclick="closeExportMenu()">

                  <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" stroke="#374151" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

                    <line x1="16" y1="17" x2="8" y2="17" stroke="#374151" stroke-width="2" stroke-linecap="round"/>
                  </svg>
                </div>
                <div class="export-item-text">

                  <span class="export-item-ext">(.docx)</span>
                </div>
              </button>
              <button class="export-item" onclick="closeExportMenu()">
                <div class="export-item-icon">
                  <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none">
                    <rect x="3" y="3" width="18" height="18" rx="2" stroke="#374151" stroke-width="2"/>
                    <path d="M3 9h18M3 15h18M9 3v18M15 3v18" stroke="#374151" stroke-width="2" stroke-linecap="round"/>
                  </svg>
                </div>
                <div class="export-item-text">
                  <span class="export-item-label">Export as Excel</span>
                  <span class="export-item-ext">(.xlsx)</span>
                </div>
              </button>
            </div>
          </div>
          <button class="btn-primary">Refresh Data</button>
        </div>
      </div>

      <!-- Sprint list -->
      <div class="sprint-list">

        <!-- ── Sprint 24 — ACTIVE & EXPANDED ── -->
        <div class="sprint-card expanded">
          <button class="sprint-row" onclick="toggleSprint(this)">
            <div class="sprint-identity">
              <div class="sprint-bar bar-active"></div>
              <div class="sprint-meta">
                <span class="sprint-name">Sprint 24</span>
                <span class="sprint-dates">Oct 12 – Oct 26, 2023</span>
              </div>
              <span class="badge badge-active">ACTIVE</span>
            </div>
            <div class="sprint-stats-mini">
              <div class="stat-mini">
                <span class="stat-mini-label">Found</span>
                <span class="stat-mini-val">42</span>
              </div>
              <div class="stat-mini">
                <span class="stat-mini-label">Resolved</span>
                <span class="stat-mini-val val-resolved">28</span>
              </div>
            </div>
            <div class="sprint-progress-wrap">
              <div class="progress-labels">
                <span class="progress-label">Progress</span>
                <span class="progress-pct">66%</span>
              </div>
              <div class="progress-track">
                <div class="progress-fill" style="width:66%"></div>
              </div>
            </div>
            <span class="chevron" aria-label="Collapse">
              <svg xmlns="http://www.w3.org/2000/svg" width="12" height="8" viewBox="0 0 12 8" fill="none">
                <path d="M1 1L6 6L11 1" stroke="#434654" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
          </button>

            <div class="detail-header">
              <span class="detail-heading">Bug Severity Distribution</span>
            </div>
            <div class="severity-cards">
              <div class="severity-item">
                <div class="severity-indicator" style="background:#dc2626"></div>
                <div class="severity-body">
                  <span class="severity-label">Critical</span>
                  <span class="severity-val">06</span>
                </div>
              </div>
              <div class="severity-item">
                <div class="severity-indicator" style="background:#f59e0b"></div>

              <div class="severity-item">

                  <span class="severity-val">09</span>
                </div>
              </div>
            </div>
