<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JIRA Bug Summary – Connection Successful</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/jira-connection-success.css" />
</head>
<body>

  <!-- ── Full-screen gray overlay ── -->
  <div class="modal-overlay">
    <dialog class="modal" open aria-labelledby="modal-title">

      <!-- Close -->
      <button class="modal-close" onclick="location.href='dashboard.html'" aria-label="Close">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none">
          <path d="M18 6L6 18M6 6L18 18" stroke="#6b7280" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </button>

      <!-- Icon: mint square + dark green circle checkmark -->
      <div class="modal-icon-wrap modal-icon-success">
        <div class="check-circle">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none">
            <polyline class="check-path" points="20 6 9 17 4 12" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>

      <!-- Title & desc -->
      <h2 class="modal-title" id="modal-title">Jira Connection Successful</h2>
      <p class="modal-desc">
        Project Alpha is now synced and ready for
        reporting. Your issue tracking and development
        workflow are seamlessly integrated.
      </p>

      <!-- Go to Dashboard button -->
      <a href="dashboard.html" class="btn-primary">Go to Dashboard</a>

    </dialog>
  </div>

</body>
</html>
